<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slop Detector</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <header>

            <h1>AI Slop Detector</h1>

            <p class="subtitle">
                Analyze text and determine whether it is likely AI-generated or human-written.
            </p>

        </header>

        <div class="input-card">

            <textarea
                id="textInput"
                placeholder="Paste your text here..."></textarea>

            <div class="live-stats">

                <div class="stat">

                    <span id="charCount">0</span>

                    <small>Characters</small>

                </div>

                <div class="stat">

                    <span id="wordCount">0</span>

                    <small>Words</small>

                </div>

                <div class="stat">

                    <span id="sentenceCount">0</span>

                    <small>Sentences</small>

                </div>

            </div>

            <div class="button-group">

                <button
                    id="analyzeBtn"
                    onclick="analyzeText()">

                    Analyze Text

                </button>

                <button
                    id="resetBtn"
                    class="secondary-btn"
                    onclick="resetPage()">

                    Reset

                </button>

            </div>

        </div>

        <div id="result">

            <div class="placeholder">

                <h2>Ready to Analyze</h2>

                <p>

                    Enter or paste text above and click
                    <strong>Analyze Text</strong>
                    to begin.

                </p>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
